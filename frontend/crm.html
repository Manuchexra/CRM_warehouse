<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM – Mijozlar | Wholesale Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
<div class="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🏬</div>
        <div><h2>Wholesale</h2><span>ERP Platform</span></div>
    </div>
    <p class="nav-section-title">Asosiy</p>
    <nav id="sidebar-nav">
        <!-- Dynamic navigation based on user role -->
    </nav>
    <div class="sidebar-footer">
        <div class="top-bar-user" style="margin-bottom:0.75rem;">
            <div class="user-avatar" id="user-avatar">A</div>
            <div>
                <div class="top-bar-user-name" id="user-name">Admin</div>
                <div class="top-bar-user-role" id="user-role"></div>
            </div>
        </div>
        <button onclick="logout()" class="btn btn-danger btn-full btn-sm">
            <i data-lucide="log-out"></i> Chiqish
        </button>
    </div>
</div>

<!-- ── Main Content ────────────────────────────────────────────────────── -->
<div class="main-content">
    <div class="page-header">
        <div>
            <h1>Mijozlar – CRM</h1>
            <p>Mijozlar bazasi va ular bilan aloqalar</p>
        </div>
        <div class="flex gap-4 items-center">
            <div class="search-bar">
                <i data-lucide="search"></i>
                <input type="text" id="search-input" placeholder="Qidirish..." oninput="onSearch(this.value)">
            </div>
            <button onclick="openModal('customer-modal')" class="btn btn-primary" id="btn-create-customer" style="display:none;">
                <i data-lucide="plus"></i> Yangi mijoz
            </button>
        </div>
    </div>

    <div class="card">
        <table id="customers-table">
            <thead>
                <tr>
                    <th>Kompaniya</th>
                    <th>Kontakt shaxs</th>
                    <th>Telefon</th>
                    <th>Email</th>
                    <th>Manzil</th>
                    <th>Amallar</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" style="text-align:center;color:var(--text-muted);">Yuklanmoqda...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- ── Create/Edit Modal ───────────────────────────────────────────────── -->
<div class="modal-overlay" id="customer-modal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Yangi mijoz</h3>
            <button class="modal-close" onclick="closeModal('customer-modal')">✕</button>
        </div>

        <input type="hidden" id="customer-id">

        <div class="form-row">
            <div class="form-group">
                <label>Kompaniya nomi *</label>
                <input type="text" id="company_name" placeholder="Kompaniya LLC" required>
            </div>
            <div class="form-group">
                <label>Kontakt shaxs *</label>
                <input type="text" id="contact_person" placeholder="Ism Familiya" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Telefon *</label>
                <input type="tel" id="phone" placeholder="+998 90 123 45 67" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="customer_email" placeholder="info@company.com">
            </div>
        </div>
        <div class="form-group">
            <label>Manzil</label>
            <input type="text" id="address" placeholder="Toshkent sh., Chilonzor tumani">
        </div>
        <div class="form-group">
            <label>Izoh</label>
            <textarea id="notes" rows="2" placeholder="Qo'shimcha ma'lumot..." style="resize: vertical;"></textarea>
        </div>

        <div class="modal-footer">
            <button onclick="closeModal('customer-modal')" class="btn btn-secondary">Bekor qilish</button>
            <button onclick="saveCustomer()" class="btn btn-primary" id="save-btn">
                <i data-lucide="save"></i> Saqlash
            </button>
        </div>
    </div>
</div>

<!-- ── Delete Confirm Modal ────────────────────────────────────────────── -->
<div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width: 400px;">
        <div class="modal-header">
            <h3>O'chirishni tasdiqlash</h3>
            <button class="modal-close" onclick="closeModal('delete-modal')">✕</button>
        </div>
        <p style="color: var(--text-muted); margin-bottom: 0.5rem;">
            <strong id="delete-name" style="color: var(--text-main);"></strong> mijozini o'chirmoqchimisiz?
        </p>
        <p style="color: var(--danger); font-size: 0.85rem;">Bu amalni qaytarib bo'lmaydi.</p>
        <div class="modal-footer">
            <button onclick="closeModal('delete-modal')" class="btn btn-secondary">Bekor qilish</button>
            <button onclick="confirmDelete()" class="btn btn-danger" id="confirm-delete-btn">
                <i data-lucide="trash-2"></i> O'chirish
            </button>
        </div>
    </div>
</div>

<div id="notification-container"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
    lucide.createIcons();

    // Show create button only for users with write access
    if (canWrite('crm')) {
        document.getElementById('btn-create-customer').style.display = '';
    }

    let deleteTargetId = null;
    let searchTimeout = null;

    // ── Load customers ────────────────────────────────────────────────────
    async function loadCustomers(search = '') {
        const tbody = document.querySelector('#customers-table tbody');
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">Yuklanmoqda...</td></tr>';
        try {
            const customers = await API.getCustomers(search);
            if (customers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><p>Mijozlar topilmadi</p></div></td></tr>';
                return;
            }
            const _canWrite = canWrite('crm');
            const _canDelete = canDelete('crm');
            tbody.innerHTML = customers.map(c => {
                let actionsHtml = '';
                if (_canWrite) {
                    actionsHtml += `<button class="btn btn-icon" onclick="editCustomer(${c.id})" title="Tahrirlash"><i data-lucide="edit-2"></i></button>`;
                }
                if (_canDelete) {
                    actionsHtml += `<button class="btn btn-icon" style="color:var(--danger); border-color:rgba(224,92,92,0.3);" onclick="promptDelete(${c.id}, '${c.company_name.replace(/'/g, "\\'")}')" title="O'chirish"><i data-lucide="trash-2"></i></button>`;
                }
                return `
                <tr>
                    <td><strong>${c.company_name}</strong></td>
                    <td>${c.contact_person || '—'}</td>
                    <td>${c.phone || '—'}</td>
                    <td style="color:var(--text-muted);">${c.email || '—'}</td>
                    <td style="color:var(--text-muted); max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.address || '—'}</td>
                    ${actionsHtml ? `<td><div class="actions">${actionsHtml}</div></td>` : '<td></td>'}
                </tr>
            `}).join('');
            lucide.createIcons();
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--danger);">Xatolik: ' + err.message + '</td></tr>';
        }
    }

    // ── Search ────────────────────────────────────────────────────────────
    function onSearch(val) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadCustomers(val), 400);
    }

    // ── Open create modal ─────────────────────────────────────────────────
    function openCreateModal() {
        document.getElementById('modal-title').textContent = 'Yangi mijoz';
        document.getElementById('customer-id').value = '';
        ['company_name','contact_person','phone','customer_email','address','notes'].forEach(id => {
            document.getElementById(id).value = '';
        });
        openModal('customer-modal');
    }

    // Override openModal for create button
    document.querySelector('[onclick="openModal(\'customer-modal\')"]').onclick = openCreateModal;

    // ── Edit customer ─────────────────────────────────────────────────────
    async function editCustomer(id) {
        try {
            const c = await API.getCustomer(id);
            document.getElementById('modal-title').textContent = 'Mijozni tahrirlash';
            document.getElementById('customer-id').value = c.id;
            document.getElementById('company_name').value = c.company_name || '';
            document.getElementById('contact_person').value = c.contact_person || '';
            document.getElementById('phone').value = c.phone || '';
            document.getElementById('customer_email').value = c.email || '';
            document.getElementById('address').value = c.address || '';
            document.getElementById('notes').value = c.notes || '';
            openModal('customer-modal');
        } catch (err) {
            showNotification('Mijoz ma\'lumotini yuklashda xatolik', 'error');
        }
    }

    // ── Save (create/update) ──────────────────────────────────────────────
    async function saveCustomer() {
        const id = document.getElementById('customer-id').value;
        const payload = {
            company_name:   document.getElementById('company_name').value.trim(),
            contact_person: document.getElementById('contact_person').value.trim(),
            phone:          document.getElementById('phone').value.trim(),
            email:          document.getElementById('customer_email').value.trim() || null,
            address:        document.getElementById('address').value.trim() || null,
            notes:          document.getElementById('notes').value.trim() || null,
        };

        if (!payload.company_name || !payload.contact_person || !payload.phone) {
            showNotification('Majburiy maydonlarni to\'ldiring', 'error'); return;
        }

        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.textContent = 'Saqlanmoqda...';

        try {
            if (id) {
                await API.updateCustomer(id, payload);
                showNotification('Mijoz muvaffaqiyatli yangilandi', 'success');
            } else {
                await API.createCustomer(payload);
                showNotification('Yangi mijoz qo\'shildi', 'success');
            }
            closeModal('customer-modal');
            loadCustomers();
        } catch (err) {
            showNotification('Xatolik: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="save"></i> Saqlash';
            lucide.createIcons();
        }
    }

    // ── Delete ────────────────────────────────────────────────────────────
    function promptDelete(id, name) {
        deleteTargetId = id;
        document.getElementById('delete-name').textContent = name;
        openModal('delete-modal');
    }

    async function confirmDelete() {
        const btn = document.getElementById('confirm-delete-btn');
        btn.disabled = true; btn.textContent = 'O\'chirilmoqda...';
        try {
            await API.deleteCustomer(deleteTargetId);
            showNotification('Mijoz o\'chirildi', 'info');
            closeModal('delete-modal');
            loadCustomers();
        } catch (err) {
            showNotification('O\'chirishda xatolik: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="trash-2"></i> O\'chirish';
            lucide.createIcons();
        }
    }

    loadCustomers();
</script>
</body>
</html>
