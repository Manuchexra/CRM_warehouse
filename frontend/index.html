<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | Wholesale Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">🏬</div>
                <h1>Xush kelibsiz</h1>
                <p>Tizimga kirish uchun ma'lumotlarni kiriting</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Elektron pochta</label>
                    <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Parol</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                    Kirish
                </button>
            </form>

            <div id="login-error" style="color: var(--danger); margin-top: 1rem; text-align: center; font-size: 0.875rem; display: none; background: var(--danger-dim); padding: 0.75rem; border-radius: 0.625rem; border: 1px solid rgba(224,92,92,0.3);"></div>
        </div>
    </div>

    <div id="notification-container"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // If already logged in, redirect
        if (localStorage.getItem('access_token')) {
            window.location.href = 'dashboard.html';
        }

        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            loginError.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Kirmoqda...';

            try {
                const data = await API.login(email, password);
                localStorage.setItem('access_token', data.access_token);

                // Fetch user profile
                try {
                    const me = await API.getMe();
                    localStorage.setItem('user', JSON.stringify(me));
                } catch (_) {
                    localStorage.setItem('user', JSON.stringify({ email }));
                }

                showNotification('Muvaffaqiyatli kirdingiz!', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
            } catch (err) {
                loginError.textContent = err.message || 'Login xatosi';
                loginError.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Kirish';
            }
        });
    </script>
</body>
</html>
